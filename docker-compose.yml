version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: user_profiles_db
      EXTERNAL_SERVICE_URL: http://mock_enrichment_service:8081/enrich
      EXTERNAL_SERVICE_TIMEOUT_MS: 1500
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: 5
      CIRCUIT_BREAKER_RESET_TIMEOUT_MS: 30000
      CIRCUIT_BREAKER_HALF_OPEN_SUCCESS_THRESHOLD: 2
      RETRY_MAX_ATTEMPTS: 3
      RETRY_BASE_DELAY_MS: 100
    depends_on:
      db:
        condition: service_healthy
      mock_enrichment_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: mysql:8
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: user_profiles_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock_enrichment_service:
    build:
      context: ./mock-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      MOCK_PORT: 8081
      MOCK_SERVICE_FAILURE_RATE: ${MOCK_SERVICE_FAILURE_RATE:-0.4}
      MOCK_SERVICE_DELAY_MS: ${MOCK_SERVICE_DELAY_MS:-200}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
